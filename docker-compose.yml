version: '3.8'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
  api:  # Opcional — podem correr a API com 'npm run start:dev'
    build: .
    ports:
      - '3000:3000'
    depends_on:
      - db
    env_file: .env

volumes:
  postgres_data:
